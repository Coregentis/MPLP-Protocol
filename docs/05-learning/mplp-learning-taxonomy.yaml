version: "1.0.0"
title: "MPLP Learning Taxonomy v1.0"
description: "Taxonomy of Learning Samples for the MPLP v1.0 Learning Loop. Strictly aligned with schemas/v2/learning/."

# Governance
status: "Frozen"
last_updated: "2025-12-01"

# Schema Mapping
# All families map to specific schemas in schemas/v2/learning/.

learning_families:
  - id: core
    title: "LearningSampleCore"
    description: "Base learning sample capturing input/output pairs and feedback."
    schema_ref: "schemas/v2/learning/mplp-learning-sample-core.schema.json"
    collection_points: ["execution_completion", "user_feedback"]

  - id: intent
    title: "LearningSampleIntent"
    description: "Samples capturing user intent resolution and refinement."
    schema_ref: "schemas/v2/learning/mplp-learning-sample-intent.schema.json"
    collection_points: ["intent_resolution", "plan_generation"]

  - id: delta
    title: "LearningSampleDelta"
    description: "Samples capturing changes (deltas) to artifacts and their impact."
    schema_ref: "schemas/v2/learning/mplp-learning-sample-delta.schema.json"
    collection_points: ["plan_revision", "code_modification"]
