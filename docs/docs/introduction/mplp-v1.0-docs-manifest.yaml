# MPLP docs helper manifest
# Informative routing aid only. This file is not a docs-side SSOT layer.

manifest_version: "1.0.0"
protocol_version: "1.0.0"
docs_release_version: "1.0.0"
base_url: "https://docs.mplp.io/docs/"

notes:
  - "Use Entry Points first for the 3+1 public-surface model."
  - "Use Specification for primary protocol/reference reading."
  - "This helper manifest does not define protocol semantics or docs authority."

structure:
  - title: Entry Points
    path: docs/reference/entrypoints

  - title: Specification
    path: docs/specification
    children:
      - title: Architecture
        path: docs/specification/architecture
      - title: Modules
        path: docs/specification/modules
      - title: Profiles
        path: docs/specification/profiles
      - title: Observability
        path: docs/specification/observability

  - title: Evaluation
    path: docs/evaluation
    children:
      - title: Golden Flows
        path: docs/evaluation/golden-flows
      - title: Validation Lab
        path: docs/evaluation/validation-lab
      - title: Conformance
        path: docs/evaluation/conformance

  - title: Guides
    path: docs/guides
    children:
      - title: SDK
        path: docs/guides/sdk
      - title: Runtime
        path: docs/guides/runtime

  - title: Meta
    path: docs/meta
