<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="mplp-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#mplp-gradient)"/>
  <!-- MPLP text -->
  <text x="60" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">MPLP</text>
  <!-- Protocol indicator (three connected dots) -->
  <circle cx="35" cy="40" r="6" fill="rgba(255,255,255,0.9)"/>
  <circle cx="60" cy="32" r="6" fill="rgba(255,255,255,0.9)"/>
  <circle cx="85" cy="40" r="6" fill="rgba(255,255,255,0.9)"/>
  <line x1="41" y1="38" x2="54" y2="34" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
  <line x1="66" y1="34" x2="79" y2="38" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
</svg>
