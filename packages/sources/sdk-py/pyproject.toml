[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mplp-sdk"
version = "1.0.5"
description = "Source-side mirror for the published mplp-sdk protocol helper package surface; not a public publish target."
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"

authors = [
  { name = "Coregentis AI" }
]

keywords = ["mplp", "multi-agent", "lifecycle", "protocol", "agent-os", "python", "source-mirror", "kernel-duties"]

classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries",
  "Topic :: Software Development :: Libraries :: Application Frameworks",
  "Typing :: Typed"
]

dependencies = []

[project.urls]
Homepage = "https://www.mplp.io"
Documentation = "https://docs.mplp.io"
Repository = "https://github.com/Coregentis/MPLP-Protocol"
Issues = "https://github.com/Coregentis/MPLP-Protocol/issues"

[tool.mplp]
protocolVersion = "1.0.0"
frozen = true
governance = "MPGC"
packageClass = "SOURCE-MIRROR"
sourcePackage = true
publishBlocked = true
publishScope = "source-package"
targetPyPIPackage = "mplp-sdk"
packageRole = "python-protocol-helper-source-mirror"
kernelDutyBaselineCarried = true
placeholderSurface = false

[tool.setuptools]
packages = ["mplp"]
package-dir = {"" = "src"}
