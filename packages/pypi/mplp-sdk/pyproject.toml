[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mplp-sdk"
version = "1.0.5"
description = "Published Python protocol helper mirror for MPLP v1.0.0 version identity and Kernel Duty baseline."
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"

authors = [
  { name = "Coregentis AI" }
]

keywords = ["mplp", "multi-agent", "lifecycle", "protocol", "python", "kernel-duties"]

classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries",
  "Topic :: Software Development :: Libraries :: Application Frameworks",
  "Typing :: Typed"
]

dependencies = []

[project.urls]
Homepage = "https://www.mplp.io/what-is-mplp"
Documentation = "https://docs.mplp.io/docs/reference/entrypoints"
Repository = "https://github.com/Coregentis/MPLP-Protocol"
Issues = "https://github.com/Coregentis/MPLP-Protocol/issues"

[tool.mplp]
protocolVersion = "1.0.0"
frozen = true
governance = "MPGC"
packageClass = "PUBLIC"
publishSurface = true
publishScope = "public-pypi"
sourcePackagePath = "packages/sources/sdk-py"
packageRole = "python-protocol-helper-publish-surface"
contractMode = "direct-schema-data-mirror"
kernelDutyBaselineCarried = true
placeholderSurface = false

[tool.setuptools]
packages = ["mplp"]
package-dir = {"" = "src"}
