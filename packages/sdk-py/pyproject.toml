[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mplp-sdk"
version = "1.0.0-rc.1"
description = "MPLP Protocol v1.0 Python SDK – schema v2 faithful models and builders"
authors = [{ name = "MPLP Protocol Team", email = "dev@mplp.dev" }]
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "pydantic>=2.0,<3.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.0",
  "mypy>=1.0",
]

[tool.setuptools.packages.find]
where = ["src"]
