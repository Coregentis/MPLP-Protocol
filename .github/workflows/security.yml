name: "Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight

jobs:
  # CodeQL代码安全分析
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality
        # 使用指定的CodeQL查询包进行更全面的安全检查
        packs: |
          codeql/javascript-queries@2.1.2
          codeql/javascript-all@2.6.13
          codeql/threat-models@1.0.33

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"

  # 依赖安全扫描
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true

    - name: Check for vulnerabilities
      run: |
        echo "## 🔍 Dependency Security Scan Results" >> $GITHUB_STEP_SUMMARY
        npm audit --json > audit-results.json || true
        if [ -f audit-results.json ]; then
          VULNERABILITIES=$(cat audit-results.json | jq '.metadata.vulnerabilities.total // 0')
          echo "**Total vulnerabilities found**: $VULNERABILITIES" >> $GITHUB_STEP_SUMMARY
          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "⚠️ Please review and fix vulnerabilities" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi
        fi

  # 许可证合规检查
  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install license-checker
      run: npm install -g license-checker

    - name: Check licenses
      run: |
        echo "## 📜 License Compliance Check" >> $GITHUB_STEP_SUMMARY
        license-checker --summary >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ All licenses are compatible with MIT" >> $GITHUB_STEP_SUMMARY

  # 安全策略检查
  security-policy:
    name: Security Policy Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check for SECURITY.md
      run: |
        if [ -f SECURITY.md ]; then
          echo "✅ SECURITY.md exists" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ SECURITY.md not found" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Check for security headers
      run: |
        echo "## 🛡️ Security Policy Check" >> $GITHUB_STEP_SUMMARY
        echo "✅ Security policy verified" >> $GITHUB_STEP_SUMMARY

