name: Semantic Lint Gate

on:
  pull_request:
    branches:
      - main
      - "20251210"
  workflow_dispatch:

jobs:
  semantic-lint:
    name: Semantic Governance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Semantic Lint Gate
        run: node scripts/semantic/semantic-lint.mjs --ci
