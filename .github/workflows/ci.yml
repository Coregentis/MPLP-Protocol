name: CI

on:
  push:
    paths:
      - "V1.0-release/**"
  pull_request:
    paths:
      - "V1.0-release/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: V1.0-release
        run: pnpm install || pnpm install --no-frozen-lockfile

      - name: Lint placeholder
        working-directory: V1.0-release
        run: pnpm run lint

      - name: Validate Schemas
        working-directory: V1.0-release
        run: node validate_schemas_simple.js

      - name: Golden Test Suite (TypeScript)
        working-directory: V1.0-release
        run: pnpm test:golden

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        working-directory: V1.0-release
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic

      - name: Golden Test Suite (Python)
        working-directory: V1.0-release
        run: python -m pytest packages/sdk-py/tests/golden/ -v

      - name: Test placeholder
        working-directory: V1.0-release
        run: pnpm run test
