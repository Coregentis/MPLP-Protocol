## Registry Format

Each release entry MUST contain:

```yaml
- sdk_version: "{major}.{minor}.{patch}"
  sdk_package: "{package-name}"
  language: "ts|py"
  package_role: "sdk_facade|schema|python_protocol_helper|..."
  protocol_version: "{protocol-version}"
  evidence_baseline_tag: "evidence-baseline-v{version}"
  truth_source_bundle_hash: "sha256:{hash}"
  release_date: "YYYY-MM-DD"
  registry_url: "https://..."
```

---

## Scope Note

This registry tracks **public publish surfaces only**.

Source package mirrors such as:

- `packages/sources/sdk-ts`
- `packages/sources/sdk-py`

are not release registry entries and MUST NOT be treated as public distribution records.
